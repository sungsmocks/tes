name: Data Process Sync

on:
  repository_dispatch:
    types: [sync-event]
  workflow_dispatch:

jobs:
  process:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Get NEXT_ROW Variable
        id: vars
        run: |
          # Use payload if provided, otherwise fallback to repo variable
          PAYLOAD_ROW="${{ github.event.client_payload.next_row }}"
          if [ -n "$PAYLOAD_ROW" ]; then
            echo "NEXT_ROW=$PAYLOAD_ROW" >> $GITHUB_ENV
          else
            echo "NEXT_ROW=${{ vars.NEXT_ROW }}" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          seleniumbase install chromedriver

      - name: Execute sync
        env:
          DATA_CSV_B64: ${{ secrets.DATA_CSV_B64 }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          NEXT_ROW: ${{ env.NEXT_ROW }}
          SYNC_URL: ${{ secrets.SYNC_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python sync.py
